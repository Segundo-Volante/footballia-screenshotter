defaults:
  targets:
    WIDE_CENTER: 50
    WIDE_LEFT: 20
    WIDE_RIGHT: 20
    MEDIUM: 15
    CLOSEUP: 10
    BEHIND_GOAL: 5
    AERIAL: 3
    OTHER: 0

sampling:
  interval_seconds: 2.0
  min_interval: 1.0
  max_interval: 6.0
  adaptive: true

pre_filter:
  enabled: true
  black_threshold: 15
  duplicate_threshold: 0.03
  scene_change_threshold: 0.35

browser:
  headless: false
  viewport_width: 1280
  viewport_height: 720
  timeout_ms: 30000

openai:
  model: gpt-4o-mini
  detail: low
  max_concurrent: 3
  cost_per_frame: 0.00007

gemini:
  model: gemini-2.0-flash
  free_tier: true

output:
  base_dir: ./recordings
  thumbnail_width: 320
